<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwen-Omni 动作理解仪表盘</title>
  <link rel="stylesheet" href="/static/style.css?v=4">
</head>
<body>
  <!-- 顶部状态栏 -->
  <header id="status-bar">
    <div class="status-item">
      <span class="status-label">系统状态</span>
      <span id="sys-status" class="status-value status-warn">未启动</span>
    </div>
    <div class="status-item">
      <span class="status-label">推理延迟</span>
      <span id="sys-latency" class="status-value">-- ms</span>
    </div>
    <div class="status-item">
      <span class="status-label">平均延迟</span>
      <span id="sys-avg-latency" class="status-value">-- ms</span>
    </div>
    <div class="status-item">
      <span class="status-label">检测人数</span>
      <span id="sys-person-count" class="status-value">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">推理次数</span>
      <span id="sys-inference-count" class="status-value">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">连接</span>
      <span id="ws-status" class="status-value status-warn">断开</span>
    </div>
    <div class="status-actions">
      <button id="btn-start" class="primary-btn">开始推理</button>
      <button id="btn-pause" class="secondary-btn">暂停推理</button>
    </div>
  </header>

  <!-- 主内容区 -->
  <main id="dashboard">
    <!-- 左侧：实时画面 -->
    <section id="video-panel">
      <h2>实时画面</h2>
      <div id="video-container">
        <img id="mjpeg-feed" src="/api/stream" alt="实时画面加载中...">
      </div>
    </section>

    <!-- 右侧：动作卡片（按推理轮次） -->
    <section id="emotion-panel">
      <h2>推理历史</h2>
      <div id="emotion-cards">
        <div class="empty-hint">等待推理结果...</div>
      </div>
    </section>
  </main>

  <script src="/static/app.js?v=5"></script>
</body>
</html>

# 模型配置

model:
  name: "Qwen2.5-Omni-3B"
  source: "https://modelscope.cn/models/Qwen/Qwen2.5-Omni-3B"
  local_path: "/Users/tonlyai/Documents/Qwen2.5/Omni3B/~/.cache/modelscope/Qwen/Qwen2.5-Omni-3B"
  backend: "transformers"          # 使用 transformers + PyTorch

inference:
  torch_dtype: "bfloat16"         # M3 Ultra 支持 bfloat16
  device_map: "auto"              # 自动选择设备 (MPS)
  attn_implementation: "sdpa"     # MPS 兼容的注意力实现 (非 flash_attention_2)
  use_audio_in_video: true         # 动作决策更依赖语气/语速，默认启用音频
  max_new_tokens: 48              # 动作决策 JSON 字段较多，避免截断输出
  do_sample: true                 # 启用轻采样，降低动作塌缩为单一类别的概率
  temperature: 0.5               # 小温度：保留稳定性，同时允许动作多样性
  top_p: 0.90                     # nucleus sampling，抑制低概率噪声动作
  repetition_penalty: 1.05        # 轻微惩罚重复 token，减少固定模板复读
  return_audio: false             # 不需要模型生成语音（仅文本输出）
  min_pixels: 100352              # 128 * 28 * 28 — 保证最低视觉清晰度
  max_pixels: 200704              # 256 * 28 * 28 — 匹配 480x270 分辨率，确保表情可辨
  torch_compile: true             # 启用 torch.compile() 加速推理
